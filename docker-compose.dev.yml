services:
  web:
    command:
      - sh
      - -c
      - |
        python -c "from app.core.database import init_db; init_db()"
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: development
      INIT_DB_ON_STARTUP: "false"
    volumes:
      - ./app:/app/app
      - ./storage:/app/storage
      - ./tests:/app/tests

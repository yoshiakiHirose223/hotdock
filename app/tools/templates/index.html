{% extends "base.html" %}

{% block content %}
<section class="section-heading">
  <p class="eyebrow">Tools</p>
  <h1>小規模ユーティリティ群</h1>
</section>

<section class="card-grid">
  {% for tool in tools %}
    <article class="feature-card">
      <h2>{{ tool.name }}</h2>
      <p>{{ tool.description }}</p>
      <a class="text-link" href="/tools/{{ tool.slug }}">Try Tool</a>
    </article>
  {% endfor %}
</section>
{% endblock %}

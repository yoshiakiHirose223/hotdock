{% extends "base.html" %}

{% block content %}
<div class="article-page-layout">
  <article class="article-layout" data-article-root>
    <div class="meta-line">
      <span>{{ post.published_at }}</span>
      {% for tag in post.tags %}
        <span class="tag-chip">{{ tag }}</span>
      {% endfor %}
    </div>
    <h1>{{ post.title }}</h1>
    <div class="article-body" data-article-body>{{ post.html | safe }}</div>
  </article>

  <aside class="article-toc" data-article-toc hidden aria-label="目次">
    <p class="article-toc-title">目次</p>
    <nav class="article-toc-links" data-article-toc-links></nav>
  </aside>
</div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', path='/js/blog-toc.js') }}"></script>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<section class="admin-login-shell">
  <div class="admin-login-card">
    <p class="eyebrow">Blog Admin</p>
    <h1>管理画面ログイン</h1>
    <p class="admin-login-copy">管理画面へ進むには、管理者 ID とパスワードで認証してください。</p>

    {% if errors %}
      <section class="notice-panel">
        {% for error in errors %}
          <p class="notice error">{{ error }}</p>
        {% endfor %}
      </section>
    {% endif %}

    <form class="tool-form admin-login-form" method="post" action="{{ blog_admin_login_path }}">
      <input type="hidden" name="next_path" value="{{ next_path }}">

      <div>
        <label for="username">ID</label>
        <input id="username" name="username" value="{{ login_username }}" autocomplete="username">
      </div>

      <div>
        <label for="password">パスワード</label>
        <input id="password" type="password" name="password" autocomplete="current-password">
      </div>

      <button type="submit">ログイン</button>
    </form>
  </div>
</section>
{% endblock %}

{% extends "hotdock/layouts/auth_base.html" %}

{% block content %}
<section class="auth-panel auth-panel-wide">
    <div class="auth-copy">
        <p class="eyebrow">{{ eyebrow }}</p>
        <h1>{{ page_heading }}</h1>
        <p>{{ support_copy }}</p>
        <ul class="summary-list">
            <li>登録後に git 連携設定へ進みます。</li>
            <li>通知先設定はメール、Slack、Chatwork を想定しています。</li>
            <li>workspace を作成すると、GitHub App installation を workspace 所有で claim できます。</li>
        </ul>
    </div>
    <form class="auth-card" method="post" action="/register">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="next" value="{{ next_path }}">
        <div class="form-row">
            <label for="signup-name">名前</label>
            <input id="signup-name" name="display_name" type="text" value="{{ form_data.display_name or '' }}" placeholder="例: 山田 太郎" required>
        </div>
        <div class="form-row">
            <label for="signup-email">メールアドレス</label>
            <input id="signup-email" name="email" type="email" value="{{ form_data.email or '' }}" placeholder="team@example.com" required>
        </div>
        <div class="form-row">
            <label for="signup-password">パスワード</label>
            <input id="signup-password" name="password" type="password" placeholder="12文字以上を推奨" required>
        </div>
        <div class="form-row">
            <label for="signup-workspace">最初の workspace 名</label>
            <input id="signup-workspace" name="workspace_name" type="text" value="{{ form_data.workspace_name or '' }}" placeholder="Hotdock Inc.">
        </div>
        <div class="form-row">
            <label for="signup-scale">利用予定規模</label>
            <select id="signup-scale" name="workspace_scale">
                <option>1-5 人</option>
                <option>6-20 人</option>
                <option>21-50 人</option>
                <option>51 人以上</option>
            </select>
        </div>
        <button class="button button-primary" type="submit">登録して設定を始める</button>
        <a class="text-link" href="/integrations/github/recover">GitHub claim の再開はこちら</a>
    </form>
</section>
{% endblock %}

{% extends "hotdock/layouts/auth_base.html" %}

{% block content %}
<section class="auth-panel">
    <div class="auth-copy">
        <p class="eyebrow">{{ eyebrow }}</p>
        <h1>{{ page_heading }}</h1>
        <p>{{ support_copy }}</p>
        <div class="inline-alert">
            GitHub App の claim 再開、workspace 選択、ダッシュボード閲覧は Hotdock セッションで管理します。
        </div>
    </div>
    <form class="auth-card" method="post" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="next" value="{{ next_path }}">
        <div class="form-row">
            <label for="login-email">メールアドレス</label>
            <input id="login-email" name="email" type="email" value="{{ form_data.email or '' }}" placeholder="team@example.com" required>
        </div>
        <div class="form-row">
            <label for="login-password">パスワード</label>
            <input id="login-password" name="password" type="password" placeholder="••••••••" required>
        </div>
        <button class="button button-primary" type="submit">ログイン</button>
        <a class="button button-ghost" href="{{ signup_href }}">新規登録へ進む</a>
        <a class="text-link" href="/install/github">GitHub App 導線を見る</a>
        <a class="text-link" href="/integrations/github/recover">GitHub claim を再開する</a>
    </form>
</section>
{% endblock %}

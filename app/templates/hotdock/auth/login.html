{% extends "hotdock/layouts/auth_base.html" %}

{% block content %}
<section class="auth-panel">
    <div class="auth-copy">
        <p class="eyebrow">{{ eyebrow }}</p>
        <h1>{{ page_heading }}</h1>
        <p>{{ support_copy }}</p>
        <div class="inline-alert">
            SaaS 利用者はログイン後に /app へ進みます。GitHub App は未提供ですが、公開後も着地点は同じ予定です。
        </div>
    </div>
    <form class="auth-card">
        <div class="form-row">
            <label for="login-email">メールアドレス</label>
            <input id="login-email" type="email" placeholder="team@example.com">
        </div>
        <div class="form-row">
            <label for="login-password">パスワード</label>
            <input id="login-password" type="password" placeholder="••••••••">
        </div>
        <button class="button button-primary" type="button">ログイン</button>
        <a class="button button-ghost" href="/signup">新規登録へ進む</a>
        <a class="text-link" href="/install/github">GitHub App 導線を見る</a>
    </form>
</section>
{% endblock %}

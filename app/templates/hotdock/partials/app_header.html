<header class="app-header">
    <button class="sidebar-toggle" type="button" data-app-sidebar-toggle>Menu</button>
    <div>
        {% if breadcrumbs %}
        <nav class="breadcrumbs" aria-label="Breadcrumb">
            {% for crumb in breadcrumbs %}
            <a href="{{ crumb.href }}">{{ crumb.label }}</a>
            {% endfor %}
        </nav>
        {% endif %}
        <h1>{{ page_heading }}</h1>
    </div>
    <div class="app-header-meta">
        {% if current_user %}
        <span class="app-header-chip">{{ current_user.display_name }}</span>
        <span class="app-header-chip app-header-chip-muted">{{ current_user.email }}</span>
        {% endif %}
        {% if current_membership %}
        <span class="app-header-chip">{{ current_membership.role }}</span>
        {% endif %}
        <span class="app-header-chip">SSR</span>
        <span class="app-header-chip">FastAPI</span>
    </div>
</header>

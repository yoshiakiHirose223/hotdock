<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ page_description }}">
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            corePlugins: {
                preflight: false,
            },
        };
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ asset_url('/static/hotdock/css/tokens.css') }}">
    <link rel="stylesheet" href="{{ asset_url('/static/hotdock/css/base.css') }}">
    <link rel="stylesheet" href="{{ asset_url('/static/hotdock/css/layout.css') }}">
    <link rel="stylesheet" href="{{ asset_url('/static/hotdock/css/components.css') }}">
    <link rel="stylesheet" href="{{ asset_url('/static/hotdock/css/app.css') }}">
</head>
<body class="{{ body_class }}">
    <div class="app-shell">
        {% include "hotdock/partials/app_sidebar.html" %}
        <div class="app-shell-main">
            {% include "hotdock/partials/app_header.html" %}
            <main class="app-content">
                {% if flash %}
                <div class="flash-banner is-{{ flash.level }}">{{ flash.message }}</div>
                {% endif %}
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script src="{{ asset_url('/static/hotdock/js/app.js') }}" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ page_description }}">
    <meta property="og:title" content="{{ meta_og_title }}">
    <meta property="og:description" content="{{ meta_og_description }}">
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            corePlugins: {
                preflight: false,
            },
        };
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ asset_url('/static/hotdock/css/tokens.css') }}">
    <link rel="stylesheet" href="{{ asset_url('/static/hotdock/css/base.css') }}">
    <link rel="stylesheet" href="{{ asset_url('/static/hotdock/css/layout.css') }}">
    <link rel="stylesheet" href="{{ asset_url('/static/hotdock/css/components.css') }}">
    <link rel="stylesheet" href="{{ asset_url('/static/hotdock/css/pages.css') }}">
</head>
<body class="{{ body_class }}">
    <header class="auth-shell-header">
        <div class="container shell-bar">
            <a class="brand-mark" href="/">Hotdock</a>
            <nav class="auth-shell-links" aria-label="Auth">
                {% for item in auth_links %}
                <a href="{{ item.href }}">{{ item.label }}</a>
                {% endfor %}
            </nav>
        </div>
    </header>
    <main class="auth-main">
        {% if flash %}
        <div class="container auth-flash-wrap">
            <div class="flash-banner is-{{ flash.level }}">{{ flash.message }}</div>
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    <footer class="auth-shell-footer">
        <div class="container shell-bar">
            <span>Hotdock preview</span>
            <a href="/contact">問い合わせ</a>
        </div>
    </footer>
</body>
</html>
